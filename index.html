<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Diksha ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Background -->
<div id="background">
    <div id="stars"></div>
    <div id="hearts"></div>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="music/birthday.mp3" type="audio/mpeg">
</audio>

<!-- Loading Screen -->
<section id="loadingScreen" class="screen active">

    <div class="glass">

        <h2>Preparing Your Surprise ❤️</h2>

        <div class="loader">
            ❤️
        </div>

        <p>Please wait...</p>

    </div>

</section>

<!-- Welcome Screen -->
<section id="welcomeScreen" class="screen">

    <div class="glass">

        <h3>Made Especially For</h3>

        <h1>Happy Birthday</h1>

        <h2>Diksha ❤️</h2>

        <p>
            Every heartbeat has a story...
            <br><br>
            Today I want to show you a little piece of my heart.
        </p>

        <button id="startJourney">
            Begin Our Journey ❤️
        </button>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
